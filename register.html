<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Register | Malawi Technical Library</title><link rel="stylesheet" href="styles.css"></head><body>
<header class="site-header"><div class="container navbar"><a class="brand" href="index.html"><span class="brand-mark">MT</span><span>Malawi Technical Library<small>Learn. Practise. Succeed.</small></span></a><nav class="nav-links"><a href="index.html">Home</a><a href="courses.html">Courses</a><a href="resources.html">Resources</a><a href="about.html">About</a></nav><div class="nav-actions"><a class="btn btn-outline" href="login.html">Log in</a></div></div></header>
<main class="auth-page"><section class="auth-card"><span class="eyebrow">Create account</span><h1>Register</h1><p class="muted">Create your Malawi Technical Library account.</p><form id="registerForm" class="auth-form"><label>Full name<input id="fullName" required autocomplete="name" placeholder="Enter full name"></label><label>Email<input id="email" type="email" required autocomplete="email" placeholder="Enter email"></label><label>Create password<div class="password-row"><input id="password" type="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters"><button type="button" data-toggle="password">Show</button></div></label><label>Confirm password<div class="password-row"><input id="confirm" type="password" required minlength="6" autocomplete="new-password" placeholder="Repeat password"><button type="button" data-toggle="confirm">Show</button></div></label><p class="form-error" id="formError" hidden></p><button class="btn btn-primary auth-submit" type="submit">Register</button></form><p class="auth-switch">Already have an account? <a href="login.html">Log in here</a></p></section></main>
<script type="module">import { registerAccount, configured } from './auth.js';document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{const i=document.querySelector('#'+b.dataset.toggle);i.type=i.type==='password'?'text':'password'});const f=document.querySelector('#registerForm'),e=document.querySelector('#formError');f.onsubmit=async ev=>{ev.preventDefault();e.hidden=true;const p=document.querySelector('#password').value,c=document.querySelector('#confirm').value;if(p!==c){e.textContent='Passwords do not match.';e.hidden=false;return}const b=f.querySelector('button[type=submit]');b.disabled=true;b.textContent='Creating account...';try{await registerAccount(document.querySelector('#fullName').value.trim(),document.querySelector('#email').value.trim(),p);location.href='resources.html'}catch(err){e.textContent=configured?(err.code==='auth/email-already-in-use'?'That email is already registered.':err.message):'Firebase is not configured yet. Open firebase-config.js and add your project details.';e.hidden=false}finally{b.disabled=false;b.textContent='Register'}};</script></body></html>
